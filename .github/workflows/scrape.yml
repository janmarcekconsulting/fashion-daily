name: Fashion Daily Scraper

on:
  schedule:
    - cron: '0 9 * * *'   # every day at 10:00 CET (09:00 UTC)
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: node scraper.js

      - name: Commit and push results
        run: |
          git config user.name  "fashion-bot"
          git config user.email "fashion-bot@users.noreply.github.com"
          git add days/ index.html
          git diff --staged --quiet || git commit -m "📰 Fashion Daily $(date -u +'%Y-%m-%d')"
          git push
